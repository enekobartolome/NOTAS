<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mis notas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;--bg2:#0f0f1a;--bg3:#161625;--bg4:#1e1e32;
  --c1:#e8c4ff;--c2:#7effd4;
  --text:#f0eeff;--text2:#8a87b0;--text3:#3d3b5c;
  --br:14px;
}
html,body{background:var(--bg);min-height:100vh;font-family:'Space Grotesk',sans-serif;color:var(--text)}
.scanline{position:fixed;top:-3px;left:0;right:0;height:3px;background:linear-gradient(transparent,rgba(120,80,255,0.06),transparent);animation:scanline 8s linear infinite;pointer-events:none;z-index:999}
@keyframes scanline{0%{top:-3px}100%{top:100vh}}
.app{max-width:780px;margin:0 auto;padding:2.5rem 1.5rem 5rem}

.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2.5rem;padding-bottom:1.75rem;border-bottom:1px solid rgba(120,80,255,0.12)}
.brand-title{font-family:'Playfair Display',serif;font-size:42px;font-weight:400;letter-spacing:-1.5px;line-height:1;color:var(--text)}
.brand-title em{font-style:italic;color:var(--c1)}
.brand-sub{font-size:11px;color:var(--text3);letter-spacing:0.14em;text-transform:uppercase;margin-top:6px;font-weight:500}
.stats-row{display:flex;gap:8px}
.stat-chip{background:var(--bg3);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:8px 16px;text-align:center;min-width:60px}
.stat-num{font-size:20px;font-weight:600;color:var(--text);line-height:1}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:3px;letter-spacing:0.05em}
.saved-toast{margin-top:10px;text-align:right;font-size:11px;color:var(--c2);opacity:0;transition:opacity 0.3s;letter-spacing:0.04em;height:16px}
.saved-toast.show{opacity:1}

.tabs{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,0.05);margin-bottom:1.75rem;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 18px;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;letter-spacing:0.05em;border-bottom:2px solid transparent;transition:all 0.2s;text-transform:uppercase;white-space:nowrap;margin-bottom:-1px;flex-shrink:0;background:none;border-left:none;border-right:none;border-top:none;font-family:'Space Grotesk',sans-serif}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--c1);border-bottom-color:var(--c1)}

.compose-wrap{background:var(--bg2);border:1px solid rgba(120,80,255,0.2);border-radius:var(--br);padding:1.25rem 1.5rem;margin-bottom:1.75rem;transition:border-color 0.3s}
.compose-wrap:focus-within{border-color:rgba(232,196,255,0.4)}
.compose-ta{width:100%;background:transparent;border:none;outline:none;font-family:'Space Grotesk',sans-serif;font-size:14px;color:var(--text);resize:none;height:80px;line-height:1.75;caret-color:var(--c1)}
.compose-ta::placeholder{color:var(--text3)}
.compose-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.05);flex-wrap:wrap;gap:10px}
.tag-area{display:flex;align-items:center;gap:6px}
.tag-hash{color:var(--c1);font-size:14px;font-weight:600}
.tag-in{background:transparent;border:none;outline:none;font-family:'Space Grotesk',sans-serif;font-size:13px;color:var(--text2);width:130px}
.tag-in::placeholder{color:var(--text3)}
.mood-row{display:flex;gap:6px}
.mood-btn{background:var(--bg4);border:1px solid rgba(255,255,255,0.07);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:14px;color:var(--text2);transition:all 0.2s;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif}
.mood-btn:hover{border-color:rgba(255,255,255,0.18);color:var(--text)}
.mood-btn.sel{border-color:var(--c1);color:var(--c1);background:rgba(232,196,255,0.1)}
.submit-btn{background:var(--c1);color:#0a0818;border:none;border-radius:10px;padding:9px 24px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:transform 0.15s,opacity 0.15s;letter-spacing:0.02em}
.submit-btn:hover{opacity:0.88;transform:scale(1.02)}
.submit-btn:active{transform:scale(0.97)}

.notes-grid{display:flex;flex-direction:column;gap:10px}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes slideOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(40px)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

.note-card{border-radius:var(--br);overflow:hidden;animation:fadeUp 0.35s cubic-bezier(0.16,1,0.3,1) both;transition:transform 0.2s}
.note-card:hover{transform:translateY(-2px)}
.note-card.removing{animation:slideOut 0.25s ease forwards}
.note-inner{display:flex}
.note-bar{width:4px;flex-shrink:0}
.note-content{flex:1;padding:1rem 1.25rem;min-width:0}
.note-view-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.note-text{font-size:14px;color:var(--text);line-height:1.75;word-break:break-word;white-space:pre-wrap;flex:1}
.note-actions{display:flex;gap:4px;flex-shrink:0;opacity:0;transition:opacity 0.2s}
.note-card:hover .note-actions{opacity:1}
.note-action-btn{background:transparent;border:none;cursor:pointer;font-size:16px;color:var(--text3);padding:2px;border-radius:6px;transition:color 0.15s,background 0.15s;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-family:monospace}
.note-action-btn:hover{background:rgba(255,255,255,0.06);color:var(--text)}
.del-btn:hover{color:#ff6b6b !important}
.edit-btn:hover{color:var(--c1) !important}
.note-footer{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.note-date{font-size:11px;color:var(--text3)}
.note-mood{font-size:13px;line-height:1}
.note-tag-badge{font-size:11px;border-radius:5px;padding:2px 9px;font-weight:500;letter-spacing:0.03em}
.note-edited{font-size:10px;color:var(--text3);font-style:italic}

/* edit mode */
.note-edit-area{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(232,196,255,0.25);border-radius:8px;outline:none;font-family:'Space Grotesk',sans-serif;font-size:14px;color:var(--text);resize:vertical;line-height:1.75;padding:8px 10px;caret-color:var(--c1);min-height:72px}
.note-edit-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;flex-wrap:wrap;gap:8px}
.note-edit-tag{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:7px;outline:none;font-family:'Space Grotesk',sans-serif;font-size:12px;color:var(--text2);padding:5px 10px;width:130px}
.note-edit-mood-row{display:flex;gap:4px}
.note-edit-btns{display:flex;gap:6px}
.save-edit-btn{background:var(--c1);color:#0a0818;border:none;border-radius:8px;padding:7px 20px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:opacity 0.15s}
.save-edit-btn:hover{opacity:0.85}
.cancel-edit-btn{background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:7px 16px;font-family:'Space Grotesk',sans-serif;font-size:12px;color:var(--text2);cursor:pointer;transition:border-color 0.15s,color 0.15s}
.cancel-edit-btn:hover{border-color:rgba(255,255,255,0.22);color:var(--text)}

.empty{text-align:center;padding:4rem 0;color:var(--text3);font-size:13px;letter-spacing:0.05em}
.empty-icon{font-size:36px;margin-bottom:14px;display:block;animation:float 3s ease-in-out infinite}
</style>
</head>
<body>
<div class="scanline"></div>
<div class="app">

  <div class="header">
    <div>
      <div class="brand-title">mis <em>notas</em></div>
      <div class="brand-sub">diario personal</div>
    </div>
    <div style="text-align:right">
      <div class="stats-row" id="statsRow"></div>
      <div class="saved-toast" id="saved">guardado ✓</div>
    </div>
  </div>

  <div class="tabs" id="tabsEl"></div>

  <div class="compose-wrap">
    <textarea class="compose-ta" id="ni" placeholder="escribe un pensamiento..."></textarea>
    <div class="compose-bottom">
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
        <div class="tag-area">
          <span class="tag-hash">#</span>
          <input class="tag-in" id="ti" placeholder="etiqueta">
        </div>
        <div class="mood-row">
          <button class="mood-btn" data-mood="★" title="favorito" onclick="toggleMood('★',this)">★</button>
          <button class="mood-btn" data-mood="!" title="urgente" onclick="toggleMood('!',this)">!</button>
          <button class="mood-btn" data-mood="?" title="duda" onclick="toggleMood('?',this)">?</button>
          <button class="mood-btn" data-mood="♥" title="personal" onclick="toggleMood('♥',this)">♥</button>
        </div>
      </div>
      <button class="submit-btn" onclick="addNote()">+ añadir</button>
    </div>
  </div>

  <div class="notes-grid" id="notes"></div>
</div>

<script>
const SK = 'notas_deluxe_v2';
const PALETTES = [
  {bar:'#9b59d4',bg:'rgba(155,89,212,0.08)',tagBg:'rgba(155,89,212,0.18)',tagTxt:'#c4a0f0'},
  {bar:'#0f9e75',bg:'rgba(15,158,117,0.08)',tagBg:'rgba(15,158,117,0.15)',tagTxt:'#7effd4'},
  {bar:'#c4562a',bg:'rgba(196,86,42,0.08)',tagBg:'rgba(196,86,42,0.15)',tagTxt:'#ffb894'},
  {bar:'#c49a1a',bg:'rgba(196,154,26,0.08)',tagBg:'rgba(196,154,26,0.15)',tagTxt:'#ffd166'},
  {bar:'#2a7abf',bg:'rgba(42,122,191,0.08)',tagBg:'rgba(42,122,191,0.15)',tagTxt:'#a8d8ff'},
  {bar:'#bf2a7a',bg:'rgba(191,42,122,0.08)',tagBg:'rgba(191,42,122,0.15)',tagTxt:'#ffb3d9'},
];
const VIEWS = ['todas','favoritos','urgentes','recientes'];
let notes = [], tagMap = {}, curFilter = 'todas', selMood = '', savedT = null, editingId = null;

function load() {
  try {
    const r = localStorage.getItem(SK);
    if (r) { const d = JSON.parse(r); notes = d.notes || []; tagMap = d.tagMap || {}; }
  } catch(e) { notes = []; }
}

function save() {
  try { localStorage.setItem(SK, JSON.stringify({notes, tagMap})); } catch(e) {}
  const el = document.getElementById('saved');
  el.classList.add('show');
  clearTimeout(savedT);
  savedT = setTimeout(() => el.classList.remove('show'), 1800);
}

function pal(tag) {
  if (!tag) return PALETTES[0];
  if (!(tag in tagMap)) { tagMap[tag] = Object.keys(tagMap).length % PALETTES.length; }
  return PALETTES[tagMap[tag]];
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmt(d) {
  const m = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const dt = new Date(d);
  return `${dt.getDate()} ${m[dt.getMonth()]}, ${dt.getFullYear()}`;
}

function toggleMood(m, btn) {
  selMood = selMood === m ? '' : m;
  document.querySelectorAll('#ni ~ * .mood-btn, .compose-bottom .mood-btn').forEach(b => b.classList.remove('sel'));
  if (selMood) btn.classList.add('sel');
}

function addNote() {
  const txt = document.getElementById('ni').value.trim();
  if (!txt) return;
  const rawTag = document.getElementById('ti').value.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9\-]/g,'');
  if (rawTag && !(rawTag in tagMap)) { tagMap[rawTag] = Object.keys(tagMap).length % PALETTES.length; }
  notes.unshift({ id: Date.now().toString(), text: txt, tag: rawTag, mood: selMood, date: Date.now(), edited: false });
  document.getElementById('ni').value = '';
  document.getElementById('ti').value = '';
  selMood = '';
  document.querySelectorAll('.compose-bottom .mood-btn').forEach(b => b.classList.remove('sel'));
  curFilter = 'todas';
  save(); renderAll();
}

function deleteNote(id) {
  const el = document.getElementById('nc' + id);
  if (!el) return;
  el.classList.add('removing');
  setTimeout(() => { notes = notes.filter(n => n.id !== id); save(); renderAll(); }, 240);
}

function startEdit(id) {
  editingId = id;
  renderNotes();
  const ta = document.getElementById('edit-ta-' + id);
  if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
}

function cancelEdit() { editingId = null; renderNotes(); }

function saveEdit(id) {
  const ta = document.getElementById('edit-ta-' + id);
  const tagIn = document.getElementById('edit-tag-' + id);
  if (!ta) return;
  const newText = ta.value.trim();
  if (!newText) return;
  const newTag = tagIn ? tagIn.value.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9\-]/g,'') : '';
  const moodSel = document.querySelector('.edit-mood-btn.sel');
  const newMood = moodSel ? moodSel.dataset.mood : '';
  if (newTag && !(newTag in tagMap)) { tagMap[newTag] = Object.keys(tagMap).length % PALETTES.length; }
  notes = notes.map(n => n.id === id ? {...n, text: newText, tag: newTag, mood: newMood, edited: true, editDate: Date.now()} : n);
  editingId = null;
  save(); renderAll();
}

function toggleEditMood(btn) {
  const wasSel = btn.classList.contains('sel');
  document.querySelectorAll('.edit-mood-btn').forEach(b => b.classList.remove('sel'));
  if (!wasSel) btn.classList.add('sel');
}

function getFiltered() {
  if (curFilter === 'favoritos') return notes.filter(n => n.mood === '★');
  if (curFilter === 'urgentes') return notes.filter(n => n.mood === '!');
  if (curFilter === 'recientes') { const ago = Date.now() - 7*86400000; return notes.filter(n => n.date > ago || (n.editDate && n.editDate > ago)); }
  if (curFilter !== 'todas') return notes.filter(n => n.tag === curFilter);
  return notes;
}

function renderStats() {
  const favs = notes.filter(n => n.mood === '★').length;
  const tags = Object.keys(tagMap).length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-chip"><div class="stat-num">${notes.length}</div><div class="stat-lbl">notas</div></div>
    <div class="stat-chip"><div class="stat-num">${tags}</div><div class="stat-lbl">etiquetas</div></div>
    <div class="stat-chip"><div class="stat-num" style="color:#ffd166">${favs}</div><div class="stat-lbl">favs</div></div>
  `;
}

function renderTabs() {
  const el = document.getElementById('tabsEl');
  let html = VIEWS.map(v => `<button class="tab${curFilter===v?' active':''}" onclick="setView('${v}')">${v}</button>`).join('');
  Object.keys(tagMap).forEach(t => {
    const p = pal(t);
    const active = curFilter === t;
    html += `<button class="tab${active?' active':''}" style="${active?`color:${p.bar};border-bottom-color:${p.bar}`:''}" onclick="setView('${esc(t)}')">#${esc(t)}</button>`;
  });
  el.innerHTML = html;
}

function setView(v) { curFilter = v; renderAll(); }

function renderNotes() {
  const el = document.getElementById('notes');
  const list = getFiltered();
  if (!list.length) {
    el.innerHTML = '<div class="empty"><span class="empty-icon">✦</span>nada por aquí todavía</div>';
    return;
  }
  el.innerHTML = list.map((n, i) => {
    const p = pal(n.tag);
    const isEditing = editingId === n.id;
    const moodLabel = {'★':'favorito','!':'urgente','?':'duda','♥':'personal'}[n.mood] || '';

    if (isEditing) {
      return `<div class="note-card" id="nc${n.id}" style="background:${p.bg};border:1px solid ${p.bar}55;">
        <div class="note-inner">
          <div class="note-bar" style="background:${p.bar}"></div>
          <div class="note-content">
            <textarea class="note-edit-area" id="edit-ta-${n.id}">${esc(n.text)}</textarea>
            <div class="note-edit-footer">
              <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
                <div style="display:flex;align-items:center;gap:5px">
                  <span style="color:#e8c4ff;font-size:13px;font-weight:600">#</span>
                  <input class="note-edit-tag" id="edit-tag-${n.id}" value="${esc(n.tag)}" placeholder="etiqueta">
                </div>
                <div class="note-edit-mood-row">
                  <button class="mood-btn edit-mood-btn${n.mood==='★'?' sel':''}" data-mood="★" title="favorito" onclick="toggleEditMood(this)">★</button>
                  <button class="mood-btn edit-mood-btn${n.mood==='!'?' sel':''}" data-mood="!" title="urgente" onclick="toggleEditMood(this)">!</button>
                  <button class="mood-btn edit-mood-btn${n.mood==='?'?' sel':''}" data-mood="?" title="duda" onclick="toggleEditMood(this)">?</button>
                  <button class="mood-btn edit-mood-btn${n.mood==='♥'?' sel':''}" data-mood="♥" title="personal" onclick="toggleEditMood(this)">♥</button>
                </div>
              </div>
              <div class="note-edit-btns">
                <button class="cancel-edit-btn" onclick="cancelEdit()">cancelar</button>
                <button class="save-edit-btn" onclick="saveEdit('${n.id}')">guardar</button>
              </div>
            </div>
          </div>
        </div>
      </div>`;
    }

    return `<div class="note-card" id="nc${n.id}" style="background:${p.bg};border:1px solid ${p.bar}22;animation-delay:${i*28}ms">
      <div class="note-inner">
        <div class="note-bar" style="background:${p.bar}"></div>
        <div class="note-content">
          <div class="note-view-header">
            <div class="note-text">${esc(n.text)}</div>
            <div class="note-actions">
              <button class="note-action-btn edit-btn" onclick="startEdit('${n.id}')" title="editar">✎</button>
              <button class="note-action-btn del-btn" onclick="deleteNote('${n.id}')" title="eliminar">×</button>
            </div>
          </div>
          <div class="note-footer">
            ${n.mood ? `<span class="note-mood" title="${moodLabel}">${n.mood}</span>` : ''}
            <span class="note-date">${fmt(n.date)}</span>
            ${n.edited ? `<span class="note-edited">editado ${fmt(n.editDate)}</span>` : ''}
            ${n.tag ? `<span class="note-tag-badge" style="background:${p.tagBg};color:${p.tagTxt}">#${esc(n.tag)}</span>` : ''}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderAll() { renderStats(); renderTabs(); renderNotes(); }

document.getElementById('ni').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) addNote();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && editingId) cancelEdit();
});

load();
notes.filter(n => n.tag).forEach(n => {
  if (!(n.tag in tagMap)) { tagMap[n.tag] = Object.keys(tagMap).length % PALETTES.length; }
});
renderAll();
</script>
</body>
</html>
